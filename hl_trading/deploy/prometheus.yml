global:
  scrape_interval: 15s

scrape_configs:
  - job_name: hl-trading
    static_configs:
      # When the bot runs on the host (not in compose), use host.docker.internal (macOS/Windows).
      # On Linux, add: extra_hosts: ["host.docker.internal:host-gateway"] to prometheus service.
      - targets: ["host.docker.internal:9091"]
        labels:
          env: local
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
